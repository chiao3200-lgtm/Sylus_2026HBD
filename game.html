<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>記憶對決：與秦徹的博弈</title>
    <style>
        :root {
            --bg-color: #050508;
            --card-back-bg: #121218;
            --p1-color: #54a0ff;
            --qin-color: #ff4d4d;
            --accent: #ffd32a;
            --punish-color: #9c1c1c;
            --text: #ffffff;
            --narration: #aaa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text); 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            touch-action: manipulation; 
        }

        .main-container { 
            display: flex; 
            flex-direction: row; 
            gap: 40px; 
            align-items: center; 
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            flex: 1;
        }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; padding: 10px; overflow-y: auto; justify-content: flex-start; }
            .qin-section { width: 100% !important; flex-direction: row !important; max-height: 150px; margin-bottom: 5px; }
            .qin-portrait-frame { width: 100px !important; height: 140px !important; flex-shrink: 0; }
            .qin-dialogue { margin-top: 0 !important; flex: 1; font-size: 0.85rem !important; min-height: 65px !important; overflow-y: auto; }
            .grid { 
                grid-template-columns: repeat(4, clamp(65px, 18vw, 85px)) !important;
                grid-template-rows: repeat(3, clamp(85px, 22vh, 115px)) !important;
                gap: 8px !important;
            }
        }

        /* --- 收藏圖鑑樣式 --- */
        .collection-outer {
            width: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(20,20,25,0.8) 100%);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,211,42,0.2);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .collection-title { font-size: 0.6rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 6px; text-transform: uppercase; opacity: 0.7; }
        .collection-shelf { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .collection-item {
            position: relative; width: 42px; height: 42px;
            background: #111; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            filter: grayscale(1) brightness(0.3); transition: all 0.4s ease; border-radius: 2px;
        }
        .collection-item.unlocked { filter: grayscale(0) brightness(1); border-color: rgba(255, 211, 42, 0.5); cursor: pointer; }
        .collection-item.unlocked:hover { transform: scale(1.15); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .collection-item img { width: 75%; height: 75%; object-fit: contain; pointer-events: none; }
        .collection-item .hint { position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background: #000; color: var(--accent); font-size: 9px; padding: 2px 8px; white-space: nowrap; border-radius: 2px; display: none; border: 1px solid var(--accent); z-index: 1000; }
        .collection-item.unlocked:hover .hint { display: block; }

        /* --- 秦徹立繪與動畫 --- */
        .qin-section { width: 300px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .qin-portrait-frame {
            width: 280px; height: 420px;
            background: radial-gradient(circle at center, rgba(255, 77, 77, 0.15) 0%, transparent 70%);
            border-bottom: 3px solid var(--qin-color);
            overflow: hidden;
            display: flex; justify-content: center; align-items: flex-end;
            position: relative;
            max-height: 60vh;
        }
        .qin-image { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.6s ease-in-out; animation: qinBreathing 4s ease-in-out infinite; }
        @keyframes qinBreathing { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.01); } }
        .shake { animation: qinShake 0.5s both; }
        @keyframes qinShake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(5px, 0, 0); } }

        .qin-dialogue { margin-top: 12px; background: rgba(255, 255, 255, 0.03); border-left: 4px solid var(--qin-color); padding: 12px; width: 100%; min-height: 85px; font-size: 0.95rem; position: relative; line-height: 1.5; }
        .qin-name-tag { position: absolute; top: -10px; left: 10px; background: var(--qin-color); padding: 1px 8px; font-size: 0.7rem; font-weight: bold; }

        /* --- 遊戲棋盤與 UI --- */
        .game-section { flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .status-bar { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .player-badge { font-size: 0.9rem; padding: 8px 12px; opacity: 0.2; transition: 0.4s; font-weight: bold; border-bottom: 2px solid transparent; }
        .player-badge.active { opacity: 1; border-bottom: white 2px solid; }

        .target-card { background: #000; border: 2px solid var(--accent); padding: 10px; text-align: center; border-radius: 12px; box-shadow: 0 0 15px rgba(255, 211, 42, 0.3); width: 110px; animation: pulse 2s infinite; }
        .target-icon { width: 60px; height: 60px; object-fit: contain; }
        .target-label { font-size: 0.65rem; color: var(--accent); margin-top: 5px; font-weight: bold; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .grid { display: grid; grid-template-columns: repeat(4, 85px); grid-template-rows: repeat(3, 115px); gap: 12px; perspective: 1000px; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); cursor: default; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-back { background-color: var(--card-back-bg); border: 1px solid #333; background-size: cover; background-position: center; }
        .card-front { background: #fff; transform: rotateY(180deg); border: 2px solid #fff; }
        .card-front img { width: 85%; height: 85%; object-fit: contain; }

        /* --- 結局彈窗 --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-window { background: linear-gradient(145deg, #111 0%, #050508 100%); padding: 30px; border-top: 4px solid var(--qin-color); text-align: center; width: 100%; max-width: 450px; box-shadow: 0 15px 60px rgba(0,0,0,1); }
        .modal-window.punish { border-color: var(--punish-color); box-shadow: 0 0 40px var(--punish-color); }
        .modal-window.complete { border-color: var(--accent); border-top-width: 6px; }
        
        #end-desc { text-align: left; font-size: 1rem; color: #eee; margin: 20px 0; line-height: 1.8; }
        .sylus-quote { color: #fff; font-weight: bold; border-left: 2px solid var(--qin-color); padding-left: 10px; display: block; margin: 10px 0; }
        .story-narrative { color: var(--narration); font-style: italic; display: block; }
        
        .cat-paw-container { font-size: 2.5rem; margin: 10px 0; display: none; animation: popIn 0.5s both; }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        .action-btn { background: var(--qin-color); color: white; border: none; padding: 14px 30px; cursor: pointer; font-weight: bold; width: 100%; text-decoration: none; display: inline-block; font-size: 1rem; letter-spacing: 2px; transition: 0.3s; margin-top: 10px; }
        .action-btn:hover { filter: brightness(1.2); }
        .gallery-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-bottom: 10px; }
        .gallery-btn:hover { background: var(--accent); color: #000; }
        
        .hidden { display: none !important; }
        .visible { display: flex !important; }
    </style>
</head>
<body>

    <!-- 初始設定 (由首頁控制) -->
    <div id="setup-screen" class="modal-overlay">
        <div class="modal-window">
            <h2 style="color: var(--accent); letter-spacing: 4px;">載入中</h2>
        </div>
    </div>

    <!-- 結局與圖鑑回顧視窗 -->
    <div id="end-screen" class="modal-overlay">
        <div id="end-window" class="modal-window">
            <div id="cat-paw" class="cat-paw-container">🐾 🐾 🐾</div>
            <h2 id="end-title" style="color:var(--accent); letter-spacing:2px;"></h2>
            <div id="end-desc"></div>
            <a id="gallery-link" href="win_album.html" class="action-btn gallery-btn hidden">進入相簿</a>
            <button id="modal-close-btn" class="action-btn" onclick="startNewRound()">繼續博弈</button>
            <div id="status-counts" style="font-size:0.7rem; color:#555; margin-top:15px; letter-spacing:1px;"></div>
        </div>
    </div>

    <div class="main-container">
        <!-- 秦徹區域 -->
        <div class="qin-section">
            <div class="qin-portrait-frame">
                <img id="qin-img" class="qin-image" src="" alt="">
            </div>
            <div class="qin-dialogue">
                <div class="qin-name-tag">秦徹</div>
                <span id="qin-text">載入中...</span>
            </div>
        </div>

        <!-- 遊戲區域 -->
        <div class="game-section">
            <div class="status-bar">
                <div id="p1-badge" class="player-badge active">小狸花</div>
                <div class="target-card">
                    <img id="target-icon" src="" class="target-icon">
                    <div class="target-label">目標：<span id="target-name"></span></div>
                </div>
                <div id="qin-badge" class="player-badge" style="color: var(--qin-color);">秦徹</div>
            </div>
            <div id="grid" class="grid"></div>
        </div>
    </div>

    <!-- 收藏進度盤 -->
    <div class="collection-outer">
        <div class="collection-title">RECOLLECTION / 結局圖鑑</div>
        <div class="collection-shelf" id="collection-bar"></div>
    </div>

    <script>
        const CARD_BACK_IMG = "assets/card_back.jpg"; 
        const QIN_EXPRESSIONS = {
            "normal":   { img: "assets/qin_normal.webp", msg: "小貓玩小貓牌?有趣。" },
            "thinking": { img: "assets/qin_thinking.webp", msg: "讓我想想..." },
            "match":    { img: "assets/qin_match.webp", msg: "這對牌我就收下了。" },
            "fail":     { img: "assets/qin_fail.webp", msg: "嘖，記錯位置了嗎？" },
            "win":      { img: "assets/qin_win.webp", msg: "勝負已分。" },
            "lose":     { img: "assets/qin_lose.webp", msg: "不錯。" },
            "punish":   { img: "assets/qin_punish.webp", msg: "連續五次了..." }
        };
        const CARD_TYPES = {
            "梅菲斯特": "assets/crow.png", "Luke": "assets/luke.png", "Silas": "assets/silas.png",
            "槍": "assets/gun.png", "寶石": "assets/gem.png", "紅酒": "assets/wine.png"
        };

        const ENDING_DATA = {
            "梅菲斯特": { title: "結局：梅菲斯特的禮物", story: `<span class="story-narrative">妳成功拿到了梅菲斯特。秦徹注視著妳：</span><span class="sylus-quote">『這顆寶石梅菲斯覬覦已久，現在歸妳了。就當作是妳贏得的獎勵。』『嘎！！』</span>` },
            "Luke": { title: "結局：銘謝惠顧", story: `<span class="story-narrative">妳翻開卡牌，裡面掉出一張 Luke 留下的字條：『銘謝惠顧，下次再來。』</span><span class="sylus-quote">『那小子的把戲...不過，這局妳確實贏了。』</span>` },
            "Silas": { title: "結局：再來一次", story: `<span class="story-narrative">妳翻開了 Silas 的卡牌，背面凌亂的字跡寫著：『再來一次』。</span><span class="sylus-quote">『既然那傢伙都這麼說了，還要繼續嗎？』</span>` },
            "槍": { title: "結局：火力升級", story: `<span class="story-narrative">獲得了 N109 最新型號的手槍。秦徹優雅地靠在椅背上：</span><span class="sylus-quote">『挺適合妳，把它收好，下次見面時別對準我。』</span>` },
            "紅酒": { title: "結局：勝利的慶典", story: `<span class="story-narrative">秦徹開啟瓶塞，液體注入杯中。他舉杯致意：</span><span class="sylus-quote">『這是一支年份極佳的收藏。為妳的勝利乾杯。』</span>` },
            "寶石": { title: "結局：璀璨之物", story: `<span class="story-narrative">妳拿到了寶石。秦徹願賭服輸，緩緩將這枚象徵勝利的物品推向妳：</span><span class="sylus-quote">『妳跟梅菲斯特一樣對這些發光的東西情有獨鍾。拿去吧。』</span>` },
            "win_album": { title: "結局 A：贏得博弈", story: `<span class="story-narrative">連續三場博弈的勝利...這是妳應得的。</span><span class="sylus-quote">『不錯。既然妳贏了，這份回憶就歸妳了。』</span>`, url: "win_album.html" },
            "punishment": { title: "結局 C：懲罰遊戲", story: `<span class="story-narrative">連輸五次...妳是故意的嗎？</span><span class="sylus-quote">『既然腦袋記不住，那就用身體來記。我想，妳已經做好覺悟了吧？』</span>`, url: "punish_album.html" }
        };

        let targetPool = Object.keys(CARD_TYPES);
        let currentTarget = "", playerName = "小狸花", currentPlayer = 1, flippedCards = [], isLocked = true, qinMemory = {};
        let consecutiveWins = parseInt(localStorage.getItem('qin_consecutive_wins')) || 0;
        let consecutiveLosses = parseInt(localStorage.getItem('qin_consecutive_losses')) || 0;
        let collection = JSON.parse(localStorage.getItem('qin_collection_v2')) || {};

        // --- 核心初始化 ---
        window.addEventListener('DOMContentLoaded', async () => {
            const savedName = localStorage.getItem('qin_player_name');
            playerName = savedName || "小狸花";
            document.getElementById('p1-badge').innerText = playerName;
            document.getElementById('setup-screen').style.display = 'none';
            await preloadResources();
            startNewRound(true);
        });

        async function preloadResources() {
            const urls = [CARD_BACK_IMG, ...Object.values(QIN_EXPRESSIONS).map(e => e.img), ...Object.values(CARD_TYPES)];
            const promises = urls.map(url => new Promise(resolve => { const img = new Image(); img.src = url; img.onload = resolve; img.onerror = resolve; }));
            updateCollectionUI();
            return Promise.race([Promise.all(promises), new Promise(r => setTimeout(r, 2500))]);
        }

        // --- 圖鑑系統 ---
        function updateCollectionUI() {
            const bar = document.getElementById('collection-bar');
            if(!bar) return; bar.innerHTML = '';
            const items = [
                { id: "梅菲斯特", icon: CARD_TYPES["梅菲斯特"], label: "梅的禮物" },
                { id: "Luke", icon: CARD_TYPES["Luke"], label: "Luke字條" },
                { id: "Silas", icon: CARD_TYPES["Silas"], label: "Silas字條" },
                { id: "槍", icon: CARD_TYPES["槍"], label: "火力升級" },
                { id: "紅酒", icon: CARD_TYPES["紅酒"], label: "勝利慶典" },
                { id: "寶石", icon: CARD_TYPES["寶石"], label: "璀璨之物" },
                { id: "win_album", icon: "🐾", label: "連勝相簿", isText: true, hasUrl: true },
                { id: "punishment", icon: "⛓️", label: "懲罰遊戲", isText: true, hasUrl: true }
            ];
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = `collection-item ${collection[item.id] ? 'unlocked' : ''}`;
                if(item.isText) { div.innerText = item.icon; div.style.fontSize = "18px"; } 
                else { const img = document.createElement('img'); img.src = item.icon; div.appendChild(img); }
                const hint = document.createElement('span'); hint.className = 'hint'; hint.innerText = item.label; div.appendChild(hint);
                if(collection[item.id]) div.onclick = () => viewRecollection(item.id, item.hasUrl);
                bar.appendChild(div);
            });
            // 這裡不自動觸發成就，改由關閉一般結局後觸發
        }

        function viewRecollection(id, showLink) {
            const data = ENDING_DATA[id];
            const screen = document.getElementById('end-screen');
            document.getElementById('end-title').innerText = data.title;
            document.getElementById('end-desc').innerHTML = data.story;
            const link = document.getElementById('gallery-link');
            if (showLink && data.url) { link.classList.remove('hidden'); link.href = data.url; } else { link.classList.add('hidden'); }
            document.getElementById('cat-paw').style.display = (id === 'win_album') ? 'block' : 'none';
            document.getElementById('end-window').classList.toggle('punish', id === "punishment");
            document.getElementById('modal-close-btn').innerText = "關閉回顧";
            document.getElementById('modal-close-btn').onclick = () => { screen.style.display = 'none'; checkFullCollection(); };
            screen.style.display = 'flex';
        }

        function checkFullCollection() {
            const totalRequired = 8;
            const currentUnlocked = Object.keys(collection).length;
            if (currentUnlocked === totalRequired && !localStorage.getItem('qin_trophy_shown')) {
                setTimeout(() => {
                    const screen = document.getElementById('end-screen');
                    document.getElementById('end-title').innerText = "🏆 完美博弈收藏家";
                    document.getElementById('end-desc').innerHTML = `<span class="story-narrative">妳已經看透了秦徹所有的底牌。</span><span class="sylus-quote">『竟然收集得這麼齊全...看來妳對我真的很執著，${playerName}。這枚勳章，就送給妳當作紀念吧。』</span>`;
                    document.getElementById('modal-close-btn').innerText = "收下勳章";
                    document.getElementById('gallery-link').classList.add('hidden');
                    document.getElementById('end-window').classList.add('complete');
                    document.getElementById('modal-close-btn').onclick = () => { screen.style.display = 'none'; startNewRound(); };
                    screen.style.display = 'flex';
                    localStorage.setItem('qin_trophy_shown', 'true');
                }, 600);
            }
        }

        // --- 遊戲邏輯 ---
        function startNewRound(isFirstStart = false) {
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('modal-close-btn').innerText = "繼續博弈";
            document.getElementById('modal-close-btn').onclick = startNewRound;
            document.getElementById('end-window').classList.remove('complete');

            // 目標判定：未收集優先
            if (targetPool.length === 0) targetPool = Object.keys(CARD_TYPES);
            let uncollected = targetPool.filter(id => !collection[id]);
            if (uncollected.length > 0) {
                const rIdx = Math.floor(Math.random() * uncollected.length);
                currentTarget = uncollected[rIdx];
                targetPool = targetPool.filter(t => t !== currentTarget);
            } else {
                const rIdx = Math.floor(Math.random() * targetPool.length);
                currentTarget = targetPool.splice(rIdx, 1)[0];
            }

            document.getElementById('target-name').innerText = currentTarget;
            document.getElementById('target-icon').src = CARD_TYPES[currentTarget];

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const cardData = [...Object.keys(CARD_TYPES), ...Object.keys(CARD_TYPES)].sort(() => Math.random() - 0.5);
            cardData.forEach((type, i) => {
                const card = document.createElement('div');
                card.className = 'card'; card.dataset.type = type; card.dataset.index = i;
                card.innerHTML = `<div class="card-face card-back" style="background-image: url('${CARD_BACK_IMG}')"></div><div class="card-face card-front"><img src="${CARD_TYPES[type]}"></div>`;
                card.onclick = () => { if(!isLocked && currentPlayer === 1 && !card.classList.contains('flipped')) handleFlip(card); };
                grid.appendChild(card);
            });

            const lastWin = localStorage.getItem('qin_last_winner');
            currentPlayer = lastWin ? parseInt(lastWin) : (Math.random() < 0.5 ? 1 : 2);
            flippedCards = []; qinMemory = {};
            if (currentPlayer === 2) {
                isLocked = true; updateTurnUI();
                setQinState("thinking", isFirstStart ? "小貓玩小貓牌?有趣。" : "勝局由贏家掌控，這局由我先行。");
                setTimeout(qinAIAction, 1500);
            } else {
                isLocked = false; updateTurnUI();
                setQinState("normal", isFirstStart ? "小貓玩小貓牌?有趣。" : "該妳了。");
            }
        }

        function handleFlip(card) {
            card.classList.add('flipped');
            flippedCards.push(card);
            qinMemory[card.dataset.index] = card.dataset.type;
            if (flippedCards.length === 2) { isLocked = true; setTimeout(checkMatch, 600); }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.type === c2.dataset.type) {
                if (c1.dataset.type === currentTarget) { processEndingSequence(currentPlayer); return; }
                const msg = (currentPlayer === 1) ? "連擊！再翻一次。" : "手感不錯，我繼續。";
                setQinState(currentPlayer === 2 ? "match" : "normal", msg);
                flippedCards = [];
                if (currentPlayer === 2) { setTimeout(qinAIAction, 800); } else { isLocked = false; }
            } else {
                setQinState(currentPlayer === 2 ? "fail" : "normal", "嘖...");
                setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; switchTurn(); }, 700);
            }
        }

        function switchTurn() {
            currentPlayer = (currentPlayer === 1) ? 2 : 1;
            updateTurnUI();
            if (currentPlayer === 2) { isLocked = true; setQinState("thinking", "讓我想想..."); setTimeout(qinAIAction, 800); }
            else { isLocked = false; }
        }

        function qinAIAction() {
            const cards = document.querySelectorAll('.card');
            const hidden = [...cards].filter(c => !c.classList.contains('flipped')).map(c => parseInt(c.dataset.index));
            if (hidden.length === 0) return;
            const inMem = Object.keys(qinMemory).filter(idx => qinMemory[idx] === currentTarget && hidden.includes(parseInt(idx)));
            let p1, p2;
            if (inMem.length >= 2) { p1 = inMem[0]; p2 = inMem[1]; }
            else {
                const typeInMem = {};
                hidden.forEach(idx => { const t = qinMemory[idx]; if(t) { if(typeInMem[t]) { p1 = typeInMem[t]; p2 = idx; } else { typeInMem[t] = idx; } } });
                if(!p1) {
                    p1 = hidden[Math.floor(Math.random() * hidden.length)];
                    handleFlip(cards[p1]);
                    setTimeout(() => {
                        const m = Object.keys(qinMemory).find(idx => qinMemory[idx] === cards[p1].dataset.type && idx != p1 && hidden.includes(parseInt(idx)));
                        p2 = m || hidden.filter(i => i != p1)[Math.floor(Math.random() * (hidden.length - 1))];
                        handleFlip(cards[p2]);
                    }, 600);
                    return;
                }
            }
            handleFlip(cards[p1]); setTimeout(() => handleFlip(cards[p2]), 600);
        }

        function processEndingSequence(winner) {
            let reaction = "", state = "", title = "", story = "", url = "";
            const paw = document.getElementById('cat-paw');
            const link = document.getElementById('gallery-link');
            paw.style.display = 'none'; link.classList.add('hidden');
            localStorage.setItem('qin_last_winner', winner);

            if (winner === 1) {
                consecutiveWins++; consecutiveLosses = 0; state = "lose"; reaction = "勝負已分。";
                collection[currentTarget] = 1;
                const base = ENDING_DATA[currentTarget]; title = base.title; story = base.story;
                if (consecutiveWins >= 3) {
                    consecutiveWins = 0; collection["win_album"] = 1;
                    paw.style.display = 'block'; url = "win_album.html";
                }
            } else {
                consecutiveWins = 0; consecutiveLosses++;
                if (consecutiveLosses >= 5) {
                    consecutiveLosses = 0; state = "punish"; collection["punishment"] = 1;
                    const data = ENDING_DATA["punishment"]; title = data.title; story = data.story; url = data.url;
                } else {
                    state = "win"; title = "小貓的懲罰"; url = "lose_album.html";
                    story = `<span class="story-narrative">最後一張落入秦徹手中。</span><span class="sylus-quote">『從現在起的一整天，妳只能回答我：『喵』。』</span>`;
                }
            }
            
            localStorage.setItem('qin_collection_v2', JSON.stringify(collection));
            updateCollectionUI();
            localStorage.setItem('qin_consecutive_losses', consecutiveLosses);
            localStorage.setItem('qin_consecutive_wins', consecutiveWins);
            
            setQinState(state, reaction);
            setTimeout(() => {
                document.getElementById('end-title').innerText = title;
                document.getElementById('end-desc').innerHTML = story;
                document.getElementById('status-counts').innerText = `連勝: ${consecutiveWins} / 連敗: ${consecutiveLosses}`;
                if (url) { link.classList.remove('hidden'); link.href = url; }
                document.getElementById('end-screen').style.display = 'flex';
                // 修正「繼續博弈」按鈕的點擊事件，讓它在關閉結局後執行 checkFullCollection
                document.getElementById('modal-close-btn').onclick = () => {
                    document.getElementById('end-screen').style.display = 'none';
                    checkFullCollection();
                };
            }, 3000);
        }

        function updateTurnUI() {
            document.getElementById('p1-badge').classList.toggle('active', currentPlayer === 1);
            document.getElementById('qin-badge').classList.toggle('active', currentPlayer === 2);
        }

        function setQinState(key, msg = null) {
            const data = QIN_EXPRESSIONS[key];
            const img = document.getElementById('qin-img');
            img.style.opacity = 0;
            setTimeout(() => { img.src = data.img; document.getElementById('qin-text').innerText = msg || data.msg; img.style.opacity = 1; }, 200);
        }
    </script>
</body>
</html>
