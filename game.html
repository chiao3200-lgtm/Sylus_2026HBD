<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocol 0418</title>
    <style>
        #loading-screen { transition: opacity 0.8s ease, visibility 0.8s; }
        #loading-screen.fade-out { opacity: 0; visibility: hidden; }
        .main-container { filter: blur(10px); transition: filter 1s ease; }
        body.loaded .main-container { filter: blur(0px); }
        :root {
            --bg-color: #050508;
            --card-back-bg: #121218;
            --p1-color: #54a0ff;
            --qin-color: #ff4d4d;
            --accent: #ffd32a;
            --punish-color: #9c1c1c;
            --text: #ffffff;
            --narration: #aaa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text); 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            touch-action: manipulation; 
        }

        .main-container { 
            display: flex; 
            flex-direction: row; 
            gap: 40px; 
            align-items: center; 
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            flex: 1;
            padding-bottom: 60px; 
        }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; padding: 10px; overflow-y: auto; justify-content: flex-start; padding-bottom: 80px; }
            .qin-section { width: 100% !important; flex-direction: row !important; max-height: 150px; margin-bottom: 5px; }
            .qin-portrait-frame { width: 100px !important; height: 140px !important; flex-shrink: 0; }
            .qin-dialogue { margin-top: 0 !important; flex: 1; font-size: 0.8rem !important; min-height: 65px !important; overflow-y: auto; }
            .grid { 
                grid-template-columns: repeat(4, clamp(65px, 18vw, 85px)) !important;
                grid-template-rows: repeat(3, clamp(90px, 22vh, 115px)) !important;
                gap: 8px !important;
            }
        }

        .collection-outer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(15px); border-top: 2px solid var(--accent); z-index: 1500; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(calc(100% - 40px)); display: flex; flex-direction: column; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .collection-outer.expanded { transform: translateY(0); }
        .collection-header { width: 100%; height: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; background: linear-gradient(to bottom, rgba(255,211,42,0.15), transparent); }
        .collection-title { font-size: 0.7rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-weight: bold; margin: 0; }
        .collection-title::after { content: ' ▲'; font-size: 0.6rem; margin-left: 10px; transition: transform 0.3s; display: inline-block; }
        .collection-outer.expanded .collection-title::after { transform: rotate(180deg); }
        .collection-shelf { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; padding: 20px; max-width: 800px; }
        .collection-item { position: relative; width: 48px; height: 48px; background: #111; border: 1px solid #333; display: flex; align-items: center; justify-content: center; filter: grayscale(1) brightness(0.3); transition: all 0.4s; border-radius: 4px; }
        .collection-item.unlocked { filter: grayscale(0) brightness(1); border-color: rgba(255, 211, 42, 0.5); cursor: pointer; box-shadow: 0 0 5px rgba(255,211,42,0.1); }
        .collection-item.unlocked:hover { transform: scale(1.1); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .collection-item img { width: 75%; height: 75%; object-fit: contain; pointer-events: none; }
        .collection-item .hint { position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background: #000; color: var(--accent); font-size: 9px; padding: 2px 8px; white-space: nowrap; border-radius: 2px; display: none; border: 1px solid var(--accent); z-index: 1000; }
        .collection-item.unlocked:hover .hint { display: block; }

        .qin-section { width: 300px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .qin-portrait-frame { width: 280px; height: 420px; background: radial-gradient(circle at center, rgba(255, 77, 77, 0.15) 0%, transparent 70%); border-bottom: 3px solid var(--qin-color); overflow: hidden; display: flex; justify-content: center; align-items: flex-end; position: relative; max-height: 60vh; }
        .qin-image { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.6s ease-in-out; animation: qinBreathing 4s ease-in-out infinite; }
        @keyframes qinBreathing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .shake { animation: qinShake 0.5s both; }
        @keyframes qinShake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        .qin-dialogue { margin-top: 12px; background: rgba(255, 255, 255, 0.03); border-left: 4px solid var(--qin-color); padding: 12px; width: 100%; min-height: 85px; font-size: 0.95rem; position: relative; line-height: 1.5; }
        .qin-name-tag { position: absolute; top: -10px; left: 10px; background: var(--qin-color); padding: 1px 8px; font-size: 0.7rem; font-weight: bold; }

        .game-section { flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .status-bar { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .player-badge { font-size: 0.9rem; padding: 8px 12px; opacity: 0.2; transition: 0.4s; font-weight: bold; }
        .player-badge.active { opacity: 1; border-bottom: white 2px solid; }
        .target-card { background: #000; border: 2px solid var(--accent); padding: 10px; text-align: center; border-radius: 12px; box-shadow: 0 0 15px rgba(255, 211, 42, 0.3); width: 110px; animation: pulse 2s infinite; }
        .target-icon { width: 60px; height: 60px; object-fit: contain; }
        .target-label { font-size: 0.65rem; color: var(--accent); margin-top: 5px; font-weight: bold; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .grid { display: grid; grid-template-columns: repeat(4, 85px); grid-template-rows: repeat(3, 115px); gap: 12px; perspective: 1000px; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); cursor: default; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-back { background-color: var(--card-back-bg); border: 1px solid #333; background-size: cover; background-position: center; }
        .card-front { background: #fff; transform: rotateY(180deg); border: 2px solid #fff; }
        .card-front img { width: 85%; height: 85%; object-fit: contain; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-window { background: linear-gradient(145deg, #111 0%, #050508 100%); padding: 30px; border-top: 4px solid var(--qin-color); text-align: center; width: 100%; max-width: 450px; box-shadow: 0 15px 60px rgba(0,0,0,1); }
        .modal-window.punish { border-color: var(--punish-color); box-shadow: 0 0 40px var(--punish-color); }
        .modal-window.complete { border-color: var(--accent); border-top-width: 6px; }
        #end-desc { text-align: left; font-size: 1rem; color: #eee; margin: 20px 0; line-height: 1.8; }
        .sylus-quote { color: #fff; font-weight: bold; border-left: 2px solid var(--qin-color); padding-left: 10px; display: block; margin: 10px 0; }
        .story-narrative { color: var(--narration); font-style: italic; display: block; }
        .action-btn { background: var(--qin-color); color: white; border: none; padding: 14px 30px; cursor: pointer; font-weight: bold; width: 100%; text-decoration: none; display: inline-block; font-size: 1rem; letter-spacing: 2px; transition: 0.3s; margin-top: 10px; }
        .action-btn:hover { filter: brightness(1.2); }
        .gallery-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-bottom: 10px; }
        .gallery-btn:hover { background: var(--accent); color: #000; }
        .hidden { display: none !important; }
        .name-input { width: 100%; padding: 12px; margin: 15px 0; background: #1a1a1a; border: 1px solid #444; color: white; text-align: center; font-size: 1rem; }
    </style>
</head>

<body>

<!-- 載入遮罩 -->
<div id="loading-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background: #050508; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; backdrop-filter: blur(20px);">
    <p id="loading-text" style="color: var(--qin-color); font-family: monospace; letter-spacing: 3px; font-size: 0.9rem; margin: 0 0 20px 0; text-align: center; width: 100%;">SYSTEM INITIALIZING...</p>
    <div style="width: 200px; height: 2px; background: #333; position: relative; overflow: hidden;">
        <div id="loading-bar" style="width: 0%; height: 100%; background: var(--qin-color); transition: width 0.3s;"></div>
    </div>
</div>

    <!-- 初始設定彈窗 -->
    <div id="setup-screen" class="modal-overlay">
        <div class="modal-window">
            <h2 style="color: var(--accent); letter-spacing: 4px;">Protocol 0418</h2>
            <p style="color: #888; font-size: 0.8rem;">秦 徹：鬼鬼祟祟這麼久，只是想跟我玩遊戲？</p>
            <input type="text" id="p-name-input" class="name-input" placeholder="輸入妳的名字 (預設: 小狸花)" maxlength="8">
            <button id="start-btn" class="action-btn" onclick="initGame()">進入博弈</button>
        </div>
    </div>

    <!-- 結局與圖鑑回顧 -->
    <div id="end-screen" class="modal-overlay">
        <div id="end-window" class="modal-window">
            <h2 id="end-title" style="color:var(--accent); letter-spacing:2px;"></h2>
            <div id="end-desc"></div>
            <a id="gallery-link" href="#" class="action-btn gallery-btn hidden">進入結局</a>
            <button id="modal-close-btn" class="action-btn" onclick="startNewRound()">繼續挑戰</button>
            <div id="status-counts" style="font-size:0.7rem; color:#555; margin-top:15px; letter-spacing:1px;"></div>
        </div>
    </div>

    <div class="main-container">
        <div class="qin-section">
            <div class="qin-portrait-frame">
                <img id="qin-img" class="qin-image" src="" alt="">
            </div>
            <div class="qin-dialogue">
                <div class="qin-name-tag">秦徹</div>
                <span id="qin-text">載入中...</span>
            </div>
        </div>

        <div class="game-section">
            <div class="status-bar">
                <div id="p1-badge" class="player-badge active">小狸花</div>
                <div class="target-card">
                    <img id="target-icon" src="" class="target-icon">
                    <div class="target-label">目標：<span id="target-name"></span></div>
                </div>
                <div id="qin-badge" class="player-badge" style="color: var(--qin-color);">秦徹</div>
            </div>
            <div id="grid" class="grid"></div>
        </div>
    </div>

    <div class="collection-outer" id="collection-drawer">
        <div class="collection-header" onclick="toggleCollection()">
            <div class="collection-title">RECOLLECTION / 結局圖鑑</div>
        </div>
        <div class="collection-shelf" id="collection-bar"></div>
    </div>

    <script>
    let qinMatchStreak = 0; 
    const CARD_BACK_IMG = "assets/card_back.jpg"; 
    const QIN_EXPRESSIONS = {
        "normal":   { img: "https://cdn.imgchest.com/files/aab5aefd35bc.webp", msg: "準備好了嗎？" },
        "thinking": { img: "https://cdn.imgchest.com/files/cdee219a4af0.webp", msg: "讓我想想..." },
        "match":    { img: "https://cdn.imgchest.com/files/3dc69f9320a8.webp", msg: "這對牌我就收下了。" },
        "fail":     { img: "https://cdn.imgchest.com/files/87047652afe9.webp", msg: "嘖，記錯位置了嗎？" },
        "win":      { img: "https://cdn.imgchest.com/files/514bf4ab9a86.webp", msg: "勝負已分。" },
        "lose":     { img: "https://cdn.imgchest.com/files/8b290acd1c07.webp", msg: "不錯。" },
        "punish":   { img: "https://cdn.imgchest.com/files/6ea8c80585d8.webp", msg: "這可是妳自找的..." }
    };
    const CARD_TYPES = {
        "梅菲斯特": "assets/crow.png", "薛明": "assets/luke.png", "薛影": "assets/silas.png",
        "槍": "assets/gun.png", "寶石": "assets/gem.png", "紅酒": "assets/wine.png"
    };
    
    const DIALOGUES = {
        player_match: ["不錯，再一次。", "記憶力挺好。", "節奏掌握得很好。"],
        player_fail: ["記錯位置了？有趣。", "妳的專注力跑哪去了？", "心不在焉？是在想我？"],
        system_fail: ["嘖，記錯了。", "看走眼了嗎？沒關係。", "剛才那個位置...我記住了。"],
        player_waiting: ["手懸在半空中很久了，在猶豫什麼？", "需要我握著妳的手選一張嗎？", "牌就在那裡，妳的目光卻一直在我身上。"],
        qin_streak: ["連對兩次。這局的節奏由我掌控了。", "第三組。小貓，妳打算就這樣一直看著我把牌拿走嗎？"]
    };

    const ENDING_DATA = {
        "梅菲斯特": { title: "結局：梅菲斯特的禮物", story: `<span class="story-narrative">妳成功拿到了梅菲斯特。秦徹注視著妳：</span><span class="sylus-quote">『這顆寶石梅菲斯覬覦已久，現在歸妳了。就當作是妳贏得的獎勵。』『嘎嘎！！』</span>`, url: null },
        "薛明": { title: "結局：銘謝惠顧", story: `<span class="story-narrative">掉出一張 薛明 留下的字條：『銘謝惠顧，下次再來。』</span><span class="sylus-quote">『那小子的把戲...不過這局妳確實贏了。』</span>`, url: null },
        "薛影": { title: "結局：再來一次", story: `<span class="story-narrative">妳翻開了 薛影 的卡牌，背面凌亂的字跡寫著：『再來一次』。</span><span class="sylus-quote">『既然那傢伙都這麼說了，還要繼續嗎？』</span>`, url: null },
        "槍": { title: "結局：火力升級", story: `<span class="story-narrative">獲得了 N109 最新型號的手槍。秦徹優雅地靠在椅背上：</span><span class="sylus-quote">『把它收好，但別拿它對準我。』</span>`, url: null },
        "紅酒": { title: "結局：勝利慶典", story: `<span class="story-narrative">秦徹開啟瓶塞。他舉杯致意：</span><span class="sylus-quote">『這是一支年份極佳的收藏。為妳的勝利乾杯。』</span>`, url: null },
        "寶石": { title: "結局：閃耀之物", story: `<span class="story-narrative">妳拿到了寶石。秦徹願賭服輸：</span><span class="sylus-quote">『妳跟梅菲斯特一樣對這些發光的東西情有獨鍾。拿去吧。』</span>`, url: null },
        "lose_round": { title: "結局：失敗的小貓", story: `<span class="story-narrative">最後一張目標落入秦徹手中。</span><span class="sylus-quote">『看來妳今天的運氣和記性都不夠。現在開始妳得聽我的。』</span>`, url: "lose_album.html" },
        "win_album": { title: "Bonus：獲勝獎勵", story: `<span class="story-narrative">連續三場勝利...願賭服輸。</span><span class="sylus-quote">『不錯。既然妳贏了，想做什麼都隨妳，小貓。』</span>`, url: "win_album.html" },
        "punishment": { title: "結局：懲罰遊戲", story: `<span class="story-narrative">連輸五次...妳是故意的嗎？</span><span class="sylus-quote">『既然腦袋記不住，那就用身體來記。我想，妳已經做好覺悟了吧？』</span>`, url: "punish_album.html" },
        "trophy": { title: "成就：完美收藏家", get story() { return `<img src="assets/qin_trophy_full.webp" style="width:100%; border-radius:8px; margin-bottom:15px; border:1px solid var(--accent);"><span class="story-narrative">妳已經看透了秦徹所有的底牌。</span><span class="sylus-quote">『竟然收集得這麼齊全...看來妳對我真的很執著。』</span>`; }, url: null }
    };

    let currentTarget = "", playerName = "小狸花", currentPlayer = 1, flippedCards = [], isLocked = true, qinMemory = {};
    let targetPool = Object.keys(CARD_TYPES);
    let consecutiveWins = parseInt(localStorage.getItem('qin_consecutive_wins')) || 0;
    let consecutiveLosses = parseInt(localStorage.getItem('qin_consecutive_losses')) || 0;
    let collection = JSON.parse(localStorage.getItem('qin_collection_v2')) || {};

    // --- 改進後的精準載入流程 ---
    window.onload = async () => {
        // 1. 等待 preloadResources 真正執行完畢 (100%)
        await preloadResources();
        
        // 2. 在 UI 上強制顯示 100% 並稍作停頓，增加視覺反饋
        document.getElementById('loading-text').innerText = "DECRYPTING... 100%";
        document.getElementById('loading-bar').style.width = "100%";
        await new Promise(resolve => setTimeout(resolve, 500)); 

        // 3. 執行淡出動畫
        const loader = document.getElementById('loading-screen');
        loader.classList.add('fade-out');
        document.body.classList.add('loaded');

        // 4. 等待遮罩動畫徹底完成 (CSS transition 是 0.8s)
        await new Promise(resolve => setTimeout(resolve, 800));

        // 5. 動畫結束後才進行名字檢查與彈窗
        const savedName = localStorage.getItem('qin_player_name');
        if (savedName) {
            playerName = savedName;
            document.getElementById('p1-badge').innerText = playerName;
            startNewRound();
        } else {
            document.getElementById('setup-screen').style.display = 'flex';
        }
        updateCollectionUI();
    };

    async function preloadResources() {
        const loadingBar = document.getElementById('loading-bar');
        const loadingText = document.getElementById('loading-text');
        const urls = [CARD_BACK_IMG, ...Object.values(QIN_EXPRESSIONS).map(e => e.img), ...Object.values(CARD_TYPES)];
        let loadedCount = 0;
        
        return Promise.all(urls.map(url => new Promise(resolve => {
            const img = new Image();
            img.src = url;
            img.onload = img.onerror = () => {
                loadedCount++;
                const progress = (loadedCount / urls.length) * 100;
                loadingBar.style.width = `${progress}%`;
                loadingText.innerText = `DECRYPTING... ${Math.round(progress)}%`;
                resolve();
            };
        })));
    }

    function initGame() {
        const val = document.getElementById('p-name-input').value.trim();
        playerName = val || "小狸花";
        localStorage.setItem('qin_player_name', playerName);
        document.getElementById('p1-badge').innerText = playerName;
        document.getElementById('setup-screen').style.display = 'none';
        startNewRound();
    }

    function startNewRound() {
        isLocked = true;
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('collection-drawer').classList.remove('expanded');
        
        currentTarget = targetPool[Math.floor(Math.random() * targetPool.length)];
        document.getElementById('target-name').innerText = currentTarget;
        document.getElementById('target-icon').src = CARD_TYPES[currentTarget];
        
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const cardData = [...Object.keys(CARD_TYPES), ...Object.keys(CARD_TYPES)].sort(() => Math.random() - 0.5);
        cardData.forEach((type, i) => {
            const card = document.createElement('div');
            card.className = 'card'; card.dataset.type = type; card.dataset.index = i;
            card.innerHTML = `<div class="card-face card-back" style="background-image: url('${CARD_BACK_IMG}')"></div><div class="card-face card-front"><img src="${CARD_TYPES[type]}"></div>`;
            card.onclick = () => { if(!isLocked && currentPlayer === 1 && !card.classList.contains('flipped')) handleFlip(card); };
            grid.appendChild(card);
        });

        currentPlayer = (localStorage.getItem('qin_last_winner') === "2") ? 2 : (Math.random() < 0.5 ? 1 : 2);
        flippedCards = []; qinMemory = {}; qinMatchStreak = 0;
        
        setTimeout(() => {
            if (currentPlayer === 2) { 
                updateTurnUI(); 
                setQinState("thinking", "勝局由贏家掌控，這局我先。"); 
                setTimeout(qinAIAction, 1500); 
            } else { 
                isLocked = false; 
                updateTurnUI(); 
                setQinState("normal", "準備好了嗎？"); 
            }
        }, 800);
    }

    function handleFlip(card) {
        card.classList.add('flipped');
        flippedCards.push(card);
        qinMemory[card.dataset.index] = card.dataset.type;
        if (flippedCards.length === 2) { isLocked = true; setTimeout(checkMatch, 700); }
    }

    function checkMatch() {
        const [c1, c2] = flippedCards;
        if (c1.dataset.type === c2.dataset.type) {
            if (c1.dataset.type === currentTarget) { processEndingSequence(currentPlayer); return; }
            let msg = "";
            if (currentPlayer === 2) {
                qinMatchStreak++;
                msg = qinMatchStreak >= 2 ? DIALOGUES.qin_streak[Math.min(qinMatchStreak - 2, DIALOGUES.qin_streak.length - 1)] : "這對牌我就收下了。";
            } else { msg = "不錯。"; }
            setQinState(currentPlayer === 2 ? "match" : "normal", msg);
            if (currentPlayer === 2) {
                document.getElementById('qin-img').classList.add('shake');
                setTimeout(() => { document.getElementById('qin-img').classList.remove('shake'); flippedCards = []; qinAIAction(); }, 800);
            } else { flippedCards = []; isLocked = false; }
        } else {
            if (currentPlayer === 2) qinMatchStreak = 0;
            const msgs = (currentPlayer === 1) ? DIALOGUES.player_fail : DIALOGUES.system_fail;
            setQinState(currentPlayer === 2 ? "fail" : "normal", msgs[Math.floor(Math.random() * msgs.length)]);
            setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; switchTurn(); }, 800);
        }
    }

    function switchTurn() {
        currentPlayer = (currentPlayer === 1) ? 2 : 1;
        updateTurnUI();
        if (currentPlayer === 2) { isLocked = true; setQinState("thinking", "輪到我了。"); setTimeout(qinAIAction, 1000); } 
        else { isLocked = false; setQinState("normal", "到妳了。"); }
    }

    function qinAIAction() {
        const allCards = Array.from(document.querySelectorAll('.card'));
        const unflipped = allCards.filter(c => !c.classList.contains('flipped')).map(c => parseInt(c.dataset.index));
        if (unflipped.length < 2) return;

        let fIdx = -1, sIdx = -1;
        const mem = Object.entries(qinMemory);
        for(let i=0; i<mem.length; i++) {
            for(let j=i+1; j<mem.length; j++) {
                if(mem[i][1] === mem[j][1] && unflipped.includes(parseInt(mem[i][0])) && unflipped.includes(parseInt(mem[j][0]))) {
                    fIdx = parseInt(mem[i][0]); sIdx = parseInt(mem[j][0]); break;
                }
            }
            if(fIdx !== -1) break;
        }
        if(fIdx === -1) {
            fIdx = unflipped[Math.floor(Math.random() * unflipped.length)];
            const type = allCards[fIdx].dataset.type;
            for(let [idx, t] of mem) {
                if(t === type && parseInt(idx) !== fIdx && unflipped.includes(parseInt(idx))) { sIdx = parseInt(idx); break; }
            }
        }
        if(sIdx === -1) {
            const rem = unflipped.filter(i => i !== fIdx);
            sIdx = rem[Math.floor(Math.random() * rem.length)];
        }
        handleFlip(allCards[fIdx]);
        setTimeout(() => handleFlip(allCards[sIdx]), 700);
    }

    function processEndingSequence(winner) {
        localStorage.setItem('qin_last_winner', winner);
        let data, reaction, state;
        if (winner === 1) {
            consecutiveWins++; consecutiveLosses = 0; state = "lose";
            collection[currentTarget] = 1; data = ENDING_DATA[currentTarget];
            reaction = "這局是妳贏了。";
            if (consecutiveWins >= 3) { collection["win_album"] = 1; data = ENDING_DATA["win_album"]; }
        } else {
            consecutiveWins = 0; consecutiveLosses++; state = "win";
            collection["lose_round"] = 1; 
            data = (consecutiveLosses >= 5) ? ENDING_DATA["punishment"] : ENDING_DATA["lose_round"];
            if (consecutiveLosses >= 5) collection["punishment"] = 1;
            reaction = "勝負已分。";
        }
        localStorage.setItem('qin_collection_v2', JSON.stringify(collection));
        localStorage.setItem('qin_consecutive_losses', consecutiveLosses);
        localStorage.setItem('qin_consecutive_wins', consecutiveWins);
        setQinState(state, reaction);
        setTimeout(() => { 
            document.getElementById('end-title').innerText = data.title;
            document.getElementById('end-desc').innerHTML = typeof data.story === 'function' ? data.story() : data.story;
            document.getElementById('status-counts').innerText = `連勝: ${consecutiveWins} / 連敗: ${consecutiveLosses}`;
            const link = document.getElementById('gallery-link');
            if (data.url) { link.classList.remove('hidden'); link.href = data.url; } else { link.classList.add('hidden'); }
            document.getElementById('end-screen').style.display = 'flex';
            updateCollectionUI();
            if (Object.keys(collection).length >= 9 && !collection['trophy']) { collection['trophy'] = 1; updateCollectionUI(); }
        }, 1500);
    }

    function updateTurnUI() {
        document.getElementById('p1-badge').classList.toggle('active', currentPlayer === 1);
        document.getElementById('qin-badge').classList.toggle('active', currentPlayer === 2);
    }

    function setQinState(key, msg = null) {
        const data = QIN_EXPRESSIONS[key];
        const img = document.getElementById('qin-img');
        img.style.opacity = 0;
        setTimeout(() => { img.src = data.img; document.getElementById('qin-text').innerText = msg || data.msg; img.style.opacity = 1; }, 200);
    }

    function toggleCollection() { document.getElementById('collection-drawer').classList.toggle('expanded'); }

    function updateCollectionUI() {
        const bar = document.getElementById('collection-bar'); bar.innerHTML = '';
        const items = [
            { id: "梅菲斯特", icon: CARD_TYPES["梅菲斯特"] },
            { id: "薛明", icon: CARD_TYPES["薛明"] },
            { id: "薛影", icon: CARD_TYPES["薛影"] },
            { id: "槍", icon: CARD_TYPES["槍"] },
            { id: "紅酒", icon: CARD_TYPES["紅酒"] },
            { id: "寶石", icon: CARD_TYPES["寶石"] },
            { id: "lose_round", icon: CARD_BACK_IMG },
            { id: "win_album", icon: "🐈", isText: true },
            { id: "punishment", icon: "⛓️", isText: true },
            { id: "trophy", icon: "🏆", isText: true }
        ];
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `collection-item ${collection[item.id] ? 'unlocked' : ''}`;
            if(item.isText) { div.innerText = item.icon; div.style.color = "#eee"; } 
            else { const img = document.createElement('img'); img.src = item.icon; div.appendChild(img); }
            if(collection[item.id]) div.onclick = () => viewRecollection(item.id);
            bar.appendChild(div);
        });
    }

    function viewRecollection(id) {
        const data = ENDING_DATA[id] || ENDING_DATA["lose_round"];
        document.getElementById('end-title').innerText = data.title;
        document.getElementById('end-desc').innerHTML = typeof data.story === 'function' ? data.story() : data.story;
        const link = document.getElementById('gallery-link');
        if (data.url) { link.classList.remove('hidden'); link.href = data.url; } else { link.classList.add('hidden'); }
        document.getElementById('end-screen').style.display = 'flex';
    }
</script>
