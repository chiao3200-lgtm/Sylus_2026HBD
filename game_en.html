<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Duel: A Gambit with Sylus</title>
    <style>
        :root {
            --bg-color: #050508;
            --card-back-bg: #121218;
            --p1-color: #54a0ff;
            --qin-color: #ff4d4d;
            --accent: #ffd32a;
            --punish-color: #9c1c1c;
            --text: #ffffff;
            --narration: #aaa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text); 
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            touch-action: manipulation; 
        }

        .main-container { 
            display: flex; 
            flex-direction: row; 
            gap: 40px; 
            align-items: center; 
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; padding: 10px; overflow-y: auto; justify-content: flex-start; }
            .qin-section { width: 100% !important; flex-direction: row !important; max-height: 150px; margin-bottom: 10px; }
            .qin-portrait-frame { width: 100px !important; height: 140px !important; flex-shrink: 0; }
            .qin-dialogue { margin-top: 0 !important; flex: 1; font-size: 0.85rem !important; min-height: 65px !important; overflow-y: auto; }
            .grid { 
                grid-template-columns: repeat(4, clamp(65px, 18vw, 85px)) !important;
                grid-template-rows: repeat(3, clamp(90px, 22vh, 115px)) !important;
                gap: 8px !important;
            }
        }

        /* --- Sylus Portrait & Animation --- */
        .qin-section { width: 300px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .qin-portrait-frame {
            width: 280px; height: 420px;
            background: radial-gradient(circle at center, rgba(255, 77, 77, 0.15) 0%, transparent 70%);
            border-bottom: 3px solid var(--qin-color);
            overflow: hidden;
            display: flex; justify-content: center; align-items: flex-end;
            position: relative;
            max-height: 60vh;
        }
        .qin-image { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.6s ease-in-out; animation: qinBreathing 4s ease-in-out infinite; }
        @keyframes qinBreathing { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.01); } }
        
        .shake { animation: qinShake 0.5s both; }
        @keyframes qinShake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(5px, 0, 0); } }

        .qin-dialogue { margin-top: 12px; background: rgba(255, 255, 255, 0.03); border-left: 4px solid var(--qin-color); padding: 12px; width: 100%; min-height: 85px; font-size: 0.95rem; position: relative; line-height: 1.5; }
        .qin-name-tag { position: absolute; top: -10px; left: 10px; background: var(--qin-color); padding: 1px 8px; font-size: 0.7rem; font-weight: bold; }

        /* --- Game Board Area --- */
        .game-section { flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .status-bar { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .player-badge { font-size: 0.9rem; padding: 8px 12px; opacity: 0.2; transition: 0.4s; font-weight: bold; border-bottom: 2px solid transparent; }
        .player-badge.active { opacity: 1; border-bottom: white 2px solid; }

        .target-card { background: #000; border: 2px solid var(--accent); padding: 10px; text-align: center; border-radius: 12px; box-shadow: 0 0 15px rgba(255, 211, 42, 0.3); width: 110px; animation: pulse 2s infinite; }
        .target-icon { width: 60px; height: 60px; object-fit: contain; }
        .target-label { font-size: 0.65rem; color: var(--accent); margin-top: 5px; font-weight: bold; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .grid { display: grid; grid-template-columns: repeat(4, 85px); grid-template-rows: repeat(3, 115px); gap: 12px; perspective: 1000px; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); cursor: default; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-back { background-color: var(--card-back-bg); border: 1px solid #333; background-size: cover; background-position: center; }
        .card-front { background: #fff; transform: rotateY(180deg); border: 2px solid #fff; }
        .card-front img { width: 85%; height: 85%; object-fit: contain; }

        /* --- Result Modal --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-window { background: linear-gradient(145deg, #111 0%, #050508 100%); padding: 30px; border-top: 4px solid var(--qin-color); text-align: center; width: 100%; max-width: 450px; box-shadow: 0 15px 60px rgba(0,0,0,1); }
        .modal-window.punish { border-color: var(--punish-color); box-shadow: 0 0 40px var(--punish-color); }
        
        #end-desc { text-align: left; font-size: 1rem; color: #eee; margin: 20px 0; line-height: 1.8; }
        .sylus-quote { color: #fff; font-weight: bold; border-left: 2px solid var(--qin-color); padding-left: 10px; display: block; margin: 10px 0; }
        .story-narrative { color: var(--narration); font-style: italic; display: block; }
        
        .cat-paw-container { font-size: 2.5rem; margin: 10px 0; display: none; animation: popIn 0.5s both; }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        .action-btn { background: var(--qin-color); color: white; border: none; padding: 14px 30px; cursor: pointer; font-weight: bold; width: 100%; text-decoration: none; display: inline-block; font-size: 1rem; letter-spacing: 2px; transition: 0.3s; margin-top: 10px; }
        .action-btn:hover { filter: brightness(1.2); }
        .gallery-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-bottom: 10px; }
        .gallery-btn:hover { background: var(--accent); color: #000; }
        
        .hidden { display: none !important; }
        .visible { display: flex !important; }
        .name-input { width: 100%; padding: 12px; margin: 15px 0; background: #1a1a1a; border: 1px solid #444; color: white; text-align: center; font-size: 1rem; }
    </style>
</head>
<body>

    <!-- Initial Setup -->
    <div id="setup-screen" class="modal-overlay visible">
        <div class="modal-window">
            <h2 style="color: var(--accent); letter-spacing: 4px;">DUEL FOR THE PEAK</h2>
            <p style="color: #888; font-size: 0.8rem;">Sylus: Your taste is truly tacky.</p>
            <input type="text" id="p-name-input" class="name-input" placeholder="Enter your name (Default: Kitten)" maxlength="8">
            <button id="start-btn" class="action-btn" onclick="initGame()">START DUEL</button>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="end-screen" class="modal-overlay">
        <div id="end-window" class="modal-window">
            <div id="cat-paw" class="cat-paw-container">🐾 🐾 🐾</div>
            <h2 id="end-title" style="color:var(--accent); letter-spacing:2px;"></h2>
            <div id="end-desc"></div>
            <a id="gallery-link" href="win_album_en.html" class="action-btn gallery-btn hidden">ENTER ALBUM</a>
            <button class="action-btn" onclick="startNewRound()">CONTINUE DUEL</button>
            <div id="status-counts" style="font-size:0.7rem; color:#555; margin-top:15px; letter-spacing:1px;"></div>
        </div>
    </div>

    <div class="main-container">
        <div class="qin-section">
            <div class="qin-portrait-frame">
                <img id="qin-img" class="qin-image" src="" alt="">
            </div>
            <div class="qin-dialogue">
                <div class="qin-name-tag">Sylus</div>
                <span id="qin-text">Loading...</span>
            </div>
        </div>

        <div class="game-section">
            <div class="status-bar">
                <div id="p1-badge" class="player-badge active">Kitten</div>
                <div class="target-card">
                    <img id="target-icon" src="" class="target-icon">
                    <div class="target-label">Target: <span id="target-name"></span></div>
                </div>
                <div id="qin-badge" class="player-badge" style="color: var(--qin-color);">Sylus</div>
            </div>
            <div id="grid" class="grid"></div>
        </div>
    </div>

    <script>
        const CARD_BACK_IMG = "assets/card_back.jpg"; 

        const SYLUS_EXPRESSIONS = {
            "normal":   { img: "assets/qin_normal.webp", msg: "A kitten playing kitten cards? Interesting." },
            "thinking": { img: "assets/qin_thinking.webp", msg: "Let's see..." },
            "match":    { img: "assets/qin_match.webp", msg: "I'll take this pair." },
            "fail":     { img: "assets/qin_fail.webp", msg: "Tsk, did I remember it wrong?" },
            "win":      { img: "assets/qin_win.webp", msg: "Victory is mine." },
            "lose":     { img: "assets/qin_lose.webp", msg: "Impressive." },
            "punish":   { img: "assets/qin_punish.webp", msg: "Five times in a row..." }
        };

        const CARD_TYPES = {
            "Mephisto": "assets/crow.png",
            "Luke": "assets/luke.png",
            "Silas": "assets/silas.png",
            "Gun": "assets/gun.png",
            "Gem": "assets/gem.png",
            "Wine": "assets/wine.png"
        };

        let targetPool = Object.keys(CARD_TYPES);
        let currentTarget = "";
        let playerName = "Kitten";
        let currentPlayer = 1;
        let flippedCards = [];
        let isLocked = true;
        let qinMemory = {};
        
        let consecutiveWins = parseInt(localStorage.getItem('qin_consecutive_wins')) || 0;
        let consecutiveLosses = parseInt(localStorage.getItem('qin_consecutive_losses')) || 0;

        async function preloadResources() {
            const urls = [CARD_BACK_IMG, ...Object.values(SYLUS_EXPRESSIONS).map(e => e.img), ...Object.values(CARD_TYPES)];
            const promises = urls.map(url => new Promise(resolve => {
                const img = new Image(); img.src = url; img.onload = resolve; img.onerror = resolve;
            }));
            return Promise.all(promises);
        }

        async function initGame() {
            const nameInput = document.getElementById('p-name-input');
            if (nameInput.value.trim()) playerName = nameInput.value.trim();
            document.getElementById('p1-badge').innerText = playerName;
            localStorage.setItem('qin_player_name', playerName); 

            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = true; startBtn.innerText = "Loading...";
            
            await preloadResources();
            document.getElementById('setup-screen').classList.remove('visible');
            startNewRound(true);
        }

        function startNewRound(isFirstStart = false) {
            document.getElementById('end-screen').style.display = 'none';
            if (targetPool.length === 0) targetPool = Object.keys(CARD_TYPES);
            const rIdx = Math.floor(Math.random() * targetPool.length);
            currentTarget = targetPool.splice(rIdx, 1)[0];
            document.getElementById('target-name').innerText = currentTarget;
            document.getElementById('target-icon').src = CARD_TYPES[currentTarget];

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const cardData = [...Object.keys(CARD_TYPES), ...Object.keys(CARD_TYPES)].sort(() => Math.random() - 0.5);
            cardData.forEach((type, i) => {
                const card = document.createElement('div');
                card.className = 'card'; card.dataset.type = type; card.dataset.index = i;
                card.innerHTML = `<div class="card-face card-back" style="background-image: url('${CARD_BACK_IMG}')"></div><div class="card-face card-front"><img src="${CARD_TYPES[type]}"></div>`;
                card.onclick = () => { if(!isLocked && currentPlayer === 1 && !card.classList.contains('flipped')) handleFlip(card); };
                grid.appendChild(card);
            });

            currentPlayer = Math.random() < 0.5 ? 1 : 2;
            flippedCards = []; qinMemory = {};
            
            if (currentPlayer === 2) {
                isLocked = true; updateTurnUI();
                setQinState("thinking", isFirstStart ? "A kitten playing kitten cards? Interesting." : "I'll go first this round.");
                setTimeout(qinAIAction, 2000);
            } else {
                isLocked = false; updateTurnUI();
                setQinState("normal", "A kitten playing kitten cards? Interesting.");
            }
        }

        function handleFlip(card) {
            card.classList.add('flipped');
            flippedCards.push(card);
            qinMemory[card.dataset.index] = card.dataset.type;
            if (flippedCards.length === 2) { isLocked = true; setTimeout(checkMatch, 1000); }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            const isMatch = c1.dataset.type === c2.dataset.type;
            if (isMatch) {
                if (c1.dataset.type === currentTarget) { processEndingSequence(currentPlayer); return; }
                if (currentPlayer === 2) {
                    setQinState("match", "This pair is mine.");
                    document.getElementById('qin-img').classList.add('shake');
                    setTimeout(() => document.getElementById('qin-img').classList.remove('shake'), 500);
                }
                setTimeout(() => { flippedCards = []; switchTurn(); }, 1000);
            } else {
                setQinState(currentPlayer === 2 ? "fail" : "normal", currentPlayer === 2 ? "Tsk, forgot it." : "Lost your focus?");
                setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; switchTurn(); }, 1200);
            }
        }

        function switchTurn() {
            currentPlayer = (currentPlayer === 1) ? 2 : 1;
            updateTurnUI();
            if (currentPlayer === 2) { isLocked = true; setQinState("thinking", "Let's see..."); setTimeout(qinAIAction, 1500); }
            else { isLocked = false; }
        }

        function qinAIAction() {
            const cards = document.querySelectorAll('.card');
            const hidden = [...cards].filter(c => !c.classList.contains('flipped')).map(c => parseInt(c.dataset.index));
            if (hidden.length === 0) return;
            const inMem = Object.keys(qinMemory).filter(idx => qinMemory[idx] === currentTarget && hidden.includes(parseInt(idx)));
            let p1, p2;
            if (inMem.length >= 2) { p1 = inMem[0]; p2 = inMem[1]; }
            else {
                p1 = hidden[Math.floor(Math.random() * hidden.length)];
                handleFlip(cards[p1]);
                setTimeout(() => {
                    const match = Object.keys(qinMemory).find(idx => qinMemory[idx] === cards[p1].dataset.type && idx != p1 && hidden.includes(parseInt(idx)));
                    p2 = match || hidden.filter(i => i != p1)[Math.floor(Math.random() * (hidden.length - 1))];
                    handleFlip(cards[p2]);
                }, 1000);
                return;
            }
            handleFlip(cards[p1]); setTimeout(() => handleFlip(cards[p2]), 1000);
        }

        function processEndingSequence(winner) {
            let reaction = ""; let title = ""; let story = ""; let state = ""; let url = "";
            const paw = document.getElementById('cat-paw');
            const link = document.getElementById('gallery-link');
            const windowEl = document.getElementById('end-window');
            
            paw.style.display = 'none';
            link.classList.add('hidden');

            if (winner === 1) {
                consecutiveLosses = 0;
                consecutiveWins++;
                state = "lose";
                reaction = "Game over. It seems I underestimated you.";

                switch(currentTarget) {
                    case "Mephisto": title = "Ending: Mephisto's Prize"; story = `<span class="story-narrative">You successfully got Mephisto. Sylus watches you:</span><span class="sylus-quote">'Mephisto has been eyeing this gem for a long time, now it's yours. Consider it your reward.' *Caw! Caw!!*</span>`; break;
                    case "Luke": title = "Ending: Better Luck Next Time"; story = `<span class="story-narrative">You flipped the cards, only to find a note from Luke: 'Thanks for playing, try again next time!'</span><span class="sylus-quote">'That brat's little pranks... but you did win this round.'</span>`; break;
                    case "Silas": title = "Ending: One More Time"; story = `<span class="story-narrative">You flipped Silas's card. Scribbled on the back is: 'One more time.'</span><span class="sylus-quote">'Since he said so, shall we continue?'</span>`; break;
                    case "Gun": title = "Ending: Firepower Upgrade"; story = `<span class="story-narrative">You obtained the latest N109 pistol. Sylus leans back:</span><span class="sylus-quote">'It suits you. Keep it safe, and don't aim it at me next time.'</span>`; break;
                    case "Wine": title = "Ending: Victory Celebration"; story = `<span class="story-narrative">Sylus opens the bottle, pouring the red liquid. He raises his glass:</span><span class="sylus-quote">'An excellent vintage. A toast to your victory, ${playerName}.'</span>`; break;
                    case "Gem": title = "Ending: Radiant Object"; story = `<span class="story-narrative">You got the gem. Sylus accepts his defeat:</span><span class="sylus-quote">'You seem to have a penchant for shiny things, just like Mephisto. Take it.'</span>`; break;
                }

                if (consecutiveWins >= 3) {
                    paw.style.display = 'block';
                    link.classList.remove('hidden');
                    link.href = "win_album_en.html";
                    story += `<br><br><span class="story-narrative" style="color:var(--accent); font-weight:bold; border: 1px dashed var(--accent); padding: 5px;">🐾 Surprise for 3 wins unlocked: Album access granted.</span>`;
                }

            } else {
                consecutiveWins = 0;
                consecutiveLosses++;
                if (consecutiveLosses >= 5) {
                    consecutiveLosses = 0; state = "punish";
                    reaction = "Five times... I'll have to teach you another way.";
                    title = "Ending C: Punishment Game"; story = `<span class="story-narrative">Five losses in a row... are you doing this on purpose?</span><span class="sylus-quote">'If your head won't remember, I'll make sure your body does. I assume you're prepared?'</span>`; 
                    link.classList.remove('hidden'); link.href = "punish_album_en.html";
                    windowEl.classList.add('punish');
                } else {
                    state = "win"; 
                    reaction = "It seems you don't know me as well as you thought.";
                    title = "Ending B: Kitten's Penalty"; 
                    story = `<span class="story-narrative">The final "${currentTarget}" falls into Sylus's hands. He smirks dangerously:</span>
                            <span class="sylus-quote">'Too slow. You must follow the agreement—for the rest of the day, you're not allowed to speak human language.'</span>
                            <span class="sylus-quote">'No matter what I do to you, you can only answer me with: "Meow". Understood?'</span>
                            <span class="story-narrative">Sylus's fingers brush against your chin, looking forward to your reaction.</span>`; 
                    link.classList.remove('hidden'); link.href = "lose_album_en.html";
                    windowEl.classList.remove('punish');
                }
            }
            
            setQinState(state, reaction);
            if(state === 'punish') document.getElementById('qin-img').classList.add('shake');

            setTimeout(() => {
                const screen = document.getElementById('end-screen');
                document.getElementById('end-title').innerText = title;
                document.getElementById('end-desc').innerHTML = story;
                document.getElementById('status-counts').innerText = `Wins: ${consecutiveWins} / Losses: ${consecutiveLosses}`;
                
                screen.style.display = 'flex';
                document.getElementById('qin-img').classList.remove('shake');
            }, 3000);

            localStorage.setItem('qin_consecutive_losses', consecutiveLosses);
            localStorage.setItem('qin_consecutive_wins', consecutiveWins);
        }

        function updateTurnUI() {
            document.getElementById('p1-badge').classList.toggle('active', currentPlayer === 1);
            document.getElementById('qin-badge').classList.toggle('active', currentPlayer === 2);
        }

        function setQinState(key, msg = null) {
            const data = SYLUS_EXPRESSIONS[key];
            const img = document.getElementById('qin-img');
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = data.img;
                document.getElementById('qin-text').innerText = msg || data.msg;
                img.style.opacity = 1;
            }, 300);
        }
    </script>
</body>
</html>
