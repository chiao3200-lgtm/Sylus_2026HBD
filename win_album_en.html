<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recollection: Birthday Surprise</title>
    <style>
        :root {
            --qin-red: #ff3333;
            --p1-blue: #54a0ff;
            --bg-dark: #050505;
            --glass: rgba(0, 0, 0, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); color: #fff; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* --- Background Scene Control --- */
        #scene-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center; 
            background-color: #000; 
            transition: background-image 1s ease-in-out; 
            cursor: pointer; 
        }
        #scene-container::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9) 100%); pointer-events: none; }
        
        /* --- Dialogue System --- */
        .dialogue-wrapper { 
            position: absolute; 
            bottom: 6%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 1000px; 
            z-index: 100; 
            transition: opacity 0.4s ease, transform 0.4s ease; 
        }
        .dialogue-wrapper.ui-hidden {
            opacity: 0;
            transform: translate(-50%, 20px);
            pointer-events: none;
        }

        .dialogue-box { 
            background: linear-gradient(180deg, rgba(10, 5, 5, 0.4) 0%, rgba(0, 0, 0, 0.6) 100%); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid var(--border); 
            border-left: 6px solid var(--qin-red); 
            padding: 35px 50px; 
            min-height: 150px; 
            position: relative; 
            border-radius: 4px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: border-color 0.3s ease; 
        }
        .name-tag { 
            position: absolute; 
            top: -16px; 
            left: 25px; 
            background: var(--qin-red); 
            color: white; 
            padding: 2px 20px; 
            font-weight: bold; 
            letter-spacing: 1px; 
            font-size: 0.9rem; 
            box-shadow: 3px 3px 0px #000; 
            transition: all 0.3s ease; 
        }
        .name-tag.player { background: var(--p1-blue); }
        
        .text-content { 
            font-size: 1.15rem; 
            line-height: 1.6; 
            letter-spacing: 0.5px; 
            color: #eeeeee; 
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
        }
        
        .box-controls { position: absolute; top: 10px; right: 15px; display: flex; gap: 10px; }
        .ctrl-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa; font-size: 0.7rem; padding: 4px 12px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .ctrl-btn:hover { background: var(--qin-red); color: white; }
        .click-hint { position: absolute; bottom: 15px; right: 20px; font-size: 0.7rem; color: var(--qin-red); opacity: 0.8; letter-spacing: 1px; }
        
        #show-ui-hint {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 50%;
            display: none;
            z-index: 1001;
            cursor: pointer;
            border: 1px solid var(--qin-red);
        }

        /* --- Modal Styles --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 35px; border-top: 3px solid var(--qin-red); text-align: center; width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .m-btn { flex: 1; padding: 12px; cursor: pointer; font-weight: bold; border: 1px solid #444; background: transparent; color: #fff; text-decoration: none; display: inline-block; text-transform: uppercase; }
        .m-btn.confirm { background: var(--qin-red); border-color: var(--qin-red); }

        .credits-list { text-align: left; margin: 25px 0; }
        .credits-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .credits-label { color: var(--qin-red); font-size: 0.7rem; font-weight: bold; display: block; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
        .credits-name { color: #fff; font-size: 0.95rem; display: flex; flex-direction: column; gap: 4px; }
        .social-link { color: #70a1ff; text-decoration: none; font-size: 0.85rem; }
        
        #history-menu { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: rgba(10, 5, 5, 0.98); z-index: 500; padding: 60px 30px; transition: 0.4s; border-left: 1px solid var(--qin-red); }
        #history-menu.active { right: 0; }
        .menu-item { padding: 18px 10px; border-bottom: 1px solid #222; cursor: pointer; color: #777; font-size: 0.9rem; }

        @media (max-width: 600px) { 
            #scene-container { background-size: cover; }
            .dialogue-wrapper { width: 94%; bottom: 20px; }
            .dialogue-box { padding: 25px 20px; min-height: 120px; } 
            .box-controls { top: -45px; right: 0; } 
        }
    </style>
</head>
<body>
    <!-- Exit Modal -->
    <div id="exit-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0;">End Recollection</h3>
            <p style="color: #888; font-size: 0.85rem;">Are you sure you want to return to the duel?</p>
            <div class="modal-btns" style="display:flex; gap:10px; margin-top:20px;">
                <button class="m-btn" onclick="toggleExit(false)">Cancel</button>
                <button class="m-btn confirm" onclick="location.href='game.html'">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Credits Modal -->
    <div id="credits-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="letter-spacing: 5px; color: var(--qin-red); margin-top:0;">STAFF</h3>
            <div class="credits-list">
                <div class="credits-item">
                    <span class="credits-label">Artist</span>
                    <div class="credits-name"><span>TsangFei</span><a href="https://x.com/TsangFeiLAD" target="_blank" class="social-link">@TsangFeiLAD</a></div>
                </div>
                <div class="credits-item">
                    <span class="credits-label">Web Design</span>
                    <div class="credits-name"><span>TsangFei</span><a href="https://x.com/TsangFeiLAD" target="_blank" class="social-link">@TsangFeiLAD</a></div>
                </div>
                <div class="credits-item">
                    <span class="credits-label">Software</span>
                    <span class="credits-name" style="font-size: 0.85rem; color: #888;">Google AI studio</span>
                </div>
            </div>
            <button class="m-btn confirm" style="width:100%;" onclick="closeCredits()">End Recollection</button>
        </div>
    </div>

    <div id="show-ui-hint" onclick="toggleUI(event, false)">👁️</div>

    <div id="scene-container" onclick="handleSceneClick()">
        <div id="ui-wrapper" class="dialogue-wrapper">
           <div id="main-dialogue-box" class="dialogue-box">
                <div id="display-name" class="name-tag">Sweetie</div>
                <div class="box-controls" onclick="event.stopPropagation()">
                    <button class="ctrl-btn" onclick="toggleUI(event, true)">Hide</button>
                    <button class="ctrl-btn" onclick="toggleMenu(true)">Menu</button>
                    <button class="ctrl-btn" onclick="toggleExit(true)">Exit</button>
                </div>
                <div class="text-content" id="dialogue-text">...</div>
                <div class="click-hint">TAP TO CONTINUE ▶</div>
            </div>
        </div>
    </div>

    <div id="history-menu">
        <h2 style="color:var(--qin-red); font-size: 1.2rem; margin-bottom:30px; letter-spacing: 2px;">CELEBRATION</h2>
        <div id="menu-list"></div>
        <button onclick="toggleMenu(false)" style="margin-top:10px; background:none; border:1px solid #444; color:#666; cursor:pointer; width:100%; padding:10px; font-size: 0.7rem; text-transform: uppercase;">Close Menu</button>
    </div>

    <script>
        const playerName = localStorage.getItem('qin_player_name') || "Sweetie";
        let isUIHidden = false;

        const storyBeat = [
            { img: "https://cdn.imgchest.com/files/a0643a2a76b8.webp", speaker: "player", text: "Since I won, as promised, you have to do exactly as I say today." },
            { img: "https://cdn.imgchest.com/files/a0643a2a76b8.webp", speaker: "player", text: "The pink cat ears I bought really do suit you. I should get a pair for Mephisto next time!" },
            { img: "https://cdn.imgchest.com/files/a0643a2a76b8.webp", speaker: "player", text: "Let's take a photo to commemorate... Onychinus's cutest birthday boy." },
            { img: "https://cdn.imgchest.com/files/ebf819324cb9.webp", speaker: "player", text: `Sylus, what are you doing!? ...Give me back my phone!!` },
            { img: "https://cdn.imgchest.com/files/ebf819324cb9.webp", speaker: "Sylus", text: "『Your taste is as questionable as ever, but I'll admit the celebration service wasn't bad. I've received your sincerity, kitten.』" },
            { img: "https://cdn.imgchest.com/files/ebf819324cb9.webp", speaker: "Sylus", text: `『Since I've accepted this "grand gift"... it's only fair that I return the favor now, ${playerName}.』` },
            { img: "https://cdn.imgchest.com/files/aed49b353b5e.webp", speaker: "player", text: `Syl...us, put me... down... Hah... ah!` },
            { img: "https://cdn.imgchest.com/files/aed49b353b5e.webp", speaker: "Sylus", text: `I won't. Such a duplicitous kitten... You're the one who said you liked this position last time.` },
            { img: "https://cdn.imgchest.com/files/aed49b353b5e.webp", speaker: "Sylus", text: `Besides... you're so tight, I couldn't leave even if I wanted to.` },
            { img: "https://cdn.imgchest.com/files/aed49b353b5e.webp", speaker: " ", text: `(The dull sounds of flesh colliding echo through the room...)` },
            { img: "assets/End/win_03.webp", speaker: "Sylus", text: `The previous 'gift' was fine, but I think I prefer this one much more, ${playerName}.` },
            { img: "https://cdn.imgchest.com/files/aed49b353b5e.webp", speaker: "player", text: `Nngh! I... I can't...` },
            { img: "https://cdn.imgchest.com/files/aed49b353b5e.webp", speaker: "Sylus", text: `Do you really want me to stop?` },
            { img: "https://cdn.imgchest.com/files/aed49b353b5e.webp", speaker: "player", text: `...No.` },
            { img: "https://cdn.imgchest.com/files/aed49b353b5e.webp", speaker: "Sylus", text: `Good kitten.` },
        ];

        let currentBeat = 0;
        const scene = document.getElementById('scene-container');
        const textEl = document.getElementById('dialogue-text');
        const nameEl = document.getElementById('display-name');
        const boxEl = document.getElementById('main-dialogue-box');
        const uiWrapper = document.getElementById('ui-wrapper');
        const menuList = document.getElementById('menu-list');

        function initStory() {
            updateScene();
            storyBeat.forEach((beat, index) => {
                const item = document.createElement('div');
                item.className = 'menu-item';
                item.innerText = `Moment ${(index+1).toString().padStart(2, '0')}`;
                item.onclick = (e) => { e.stopPropagation(); jumpToBeat(index); };
                menuList.appendChild(item);
            });
        }

        function handleSceneClick() {
            if (isUIHidden) {
                toggleUI(null, false);
            } else {
                nextBeat();
            }
        }

        function toggleUI(e, hide) {
            if (e) e.stopPropagation();
            isUIHidden = hide;
            if (isUIHidden) {
                uiWrapper.classList.add('ui-hidden');
                document.getElementById('show-ui-hint').style.display = 'block';
            } else {
                uiWrapper.classList.remove('ui-hidden');
                document.getElementById('show-ui-hint').style.display = 'none';
            }
        }

        function updateScene() {
            const beat = storyBeat[currentBeat];
            scene.style.backgroundImage = `url('${beat.img}')`;
            if (beat.speaker === "player") {
                nameEl.innerText = playerName;
                nameEl.classList.add('player');
                boxEl.style.borderLeftColor = "var(--p1-blue)";
            } else {
                nameEl.innerText = (beat.speaker === " ") ? "" : beat.speaker;
                nameEl.classList.remove('player');
                boxEl.style.borderLeftColor = "var(--qin-red)";
            }
            textEl.style.transition = 'none'; 
            textEl.style.opacity = 0;
            setTimeout(() => {
                textEl.innerText = beat.text;
                textEl.style.transition = 'all 0.5s ease-out'; 
                textEl.style.opacity = 1;
            }, 50);
        }

        function nextBeat() {
            if (currentBeat < storyBeat.length - 1) { 
                currentBeat++; 
                updateScene(); 
            } else { 
                document.getElementById('credits-modal').style.display = 'flex'; 
            }
        }

        function closeCredits() {
            document.getElementById('credits-modal').style.display = 'none';
            toggleExit(true);
        }

        function jumpToBeat(index) { 
            currentBeat = index; 
            updateScene(); 
            toggleMenu(false); 
        }

        function toggleMenu(show) { document.getElementById('history-menu').classList.toggle('active', show); }
        function toggleExit(show) { document.getElementById('exit-modal').style.display = show ? 'flex' : 'none'; }

        initStory();
    </script>
</body>
</html>
