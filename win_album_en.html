<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recollection: Birthday Surprise</title>
    <style>
        :root { --qin-red: #ff3333; --p1-blue: #54a0ff; --bg-dark: #050505; --glass: rgba(0, 0, 0, 0.8); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); color: #fff; font-family: "Segoe UI", Tahoma, sans-serif; overflow: hidden; }
        #scene-container { position: relative; width: 100%; height: 100%; background-size: cover; background-position: center; transition: background-image 1s ease-in-out; cursor: pointer; }
        #scene-container::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9) 100%); pointer-events: none; }
        .dialogue-wrapper { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 850px; z-index: 100; }
        .dialogue-box { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--border); border-left: 5px solid var(--qin-red); padding: 30px 40px; min-height: 140px; position: relative; border-radius: 4px; transition: border-color 0.3s; }
        .name-tag { position: absolute; top: -16px; left: 25px; background: var(--qin-red); color: white; padding: 2px 20px; font-weight: bold; letter-spacing: 2px; font-size: 0.9rem; box-shadow: 3px 3px 0px #000; transition: background 0.3s; }
        .text-content { font-size: 1.15rem; line-height: 1.7; color: #ddd; }
        .box-controls { position: absolute; top: 10px; right: 15px; display: flex; gap: 10px; }
        .ctrl-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa; font-size: 0.75rem; padding: 4px 12px; cursor: pointer; transition: 0.3s; }
        .ctrl-btn:hover { background: var(--qin-red); color: white; }
        .click-hint { position: absolute; bottom: 15px; right: 20px; font-size: 0.75rem; color: var(--qin-red); opacity: 0.8; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 35px; border-top: 3px solid var(--qin-red); text-align: center; width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .m-btn { flex: 1; padding: 12px; cursor: pointer; font-weight: bold; border: 1px solid #444; background: transparent; color: #fff; text-decoration: none; display: inline-block; }
        .m-btn.confirm { background: var(--qin-red); border-color: var(--qin-red); }
        .credits-list { text-align: left; margin: 25px 0; }
        .credits-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .credits-label { color: var(--qin-red); font-size: 0.7rem; font-weight: bold; display: block; letter-spacing: 1px; text-transform: uppercase; }
        .credits-name { color: #fff; font-size: 0.9rem; display: flex; flex-direction: column; gap: 4px; }
        .social-link { color: #70a1ff; text-decoration: none; font-size: 0.8rem; }
        #history-menu { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: rgba(10, 5, 5, 0.98); z-index: 500; padding: 60px 30px; transition: 0.4s; border-left: 1px solid var(--qin-red); }
        #history-menu.active { right: 0; }
        .menu-item { padding: 18px 10px; border-bottom: 1px solid #222; cursor: pointer; color: #777; font-size: 0.9rem; }
        @media (max-width: 600px) { .dialogue-box { padding: 25px 20px; min-height: 120px; } .text-content { font-size: 1rem; } .box-controls { top: -40px; right: 0; } }
    </style>
</head>
<body>
    <div id="exit-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>End Recollection</h3>
            <p style="color: #888; font-size: 0.85rem;">Are you sure you want to leave this birthday memory?</p>
            <div class="modal-btns" style="display:flex; gap:15px; margin-top:30px;">
                <button class="m-btn" onclick="toggleExit(false)">Cancel</button>
                <button class="m-btn confirm" onclick="location.href='index.html'">Confirm</button>
            </div>
        </div>
    </div>
    <div id="credits-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="letter-spacing: 5px; color: var(--qin-red); margin-top:0;">STAFF</h3>
            <div class="credits-list">
                <div class="credits-item">
                    <span class="credits-label">Artist</span>
                    <div class="credits-name"><span>TsangFei蒼斐</span><a href="https://x.com/TsangFeiLAD" target="_blank" class="social-link">@TsangFeiLAD</a></div>
                </div>
                <div class="credits-item">
                    <span class="credits-label">Web Design</span>
                    <div class="credits-name"><span>蒼斐</span><a href="https://x.com/TsangFeiLAD" target="_blank" class="social-link">@TsangFeiLAD</a></div>
                </div>
                <div class="credits-item">
                    <span class="credits-label">Software</span>
                    <span class="credits-name" style="font-size: 0.85rem; color: #888;">Google AI studio</span>
                </div>
            </div>
            <button class="m-btn confirm" style="width:100%;" onclick="closeCredits()">Finish</button>
        </div>
    </div>
    <div id="scene-container" onclick="nextBeat()">
        <div class="dialogue-wrapper">
            <div id="main-dialogue-box" class="dialogue-box" onclick="event.stopPropagation()">
                <div id="display-name" class="name-tag">NAME</div>
                <div class="box-controls"><button class="ctrl-btn" onclick="toggleMenu(true)">Menu</button><button class="ctrl-btn" onclick="toggleExit(true)">Exit</button></div>
                <div class="text-content" id="dialogue-text">...</div>
                <div class="click-hint">TAP TO CONTINUE ▶</div>
            </div>
        </div>
    </div>
    <div id="history-menu">
        <h2 style="color:var(--qin-red); font-size: 1.2rem; margin-bottom:30px;">BIRTHDAY SPECIAL</h2>
        <div id="menu-list"></div>
        <button onclick="toggleMenu(false)" style="margin-top:40px; background:none; border:1px solid #444; color:#666; cursor:pointer; width:100%; padding:10px;">CLOSE</button>
    </div>
    <script>
        const playerName = localStorage.getItem('qin_player_name') || "Kitten";
        const storyBeat = [
            { img: "https://via.placeholder.com/1200x1800?text=Birthday_1", speaker: "player", text: "I won, so according to our bet, you have to do whatever I say today. Happy Birthday, Sylus." },
            { img: "https://via.placeholder.com/1200x1800?text=Birthday_2", speaker: "player", text: "Put these cat ears on... and don't take them off. The 'almighty' leader looks much 'tamer' now." },
            { img: "https://via.placeholder.com/1200x1800?text=Birthday_3", speaker: "player", text: "Open wide, eat this piece of cake. It's the birthday boy's duty. Don't frown, and don't spit it out." },
            { img: "https://via.placeholder.com/1200x1800?text=Birthday_4", speaker: "player", text: "What, didn't expect to be 'ordered around' by me? Sylus, your expression right now is priceless." },
            { img: "https://via.placeholder.com/1200x1800?text=Birthday_5", speaker: "sylus", text: "(He suddenly grabs your wrists and pins you to the sofa) 'Ordered around? You seem to have forgotten... letting you play is just another game of mine.'" },
            { img: "https://via.placeholder.com/1200x1800?text=Birthday_6", speaker: "sylus", text: ` 'I've received my birthday gift. Now... it's my turn to collect the debt you owe me, ${playerName}.' ` }
        ];
        let curIdx = 0;
        const scene = document.getElementById('scene-container'), textEl = document.getElementById('dialogue-text'), nameEl = document.getElementById('display-name'), boxEl = document.getElementById('main-dialogue-box'), menuList = document.getElementById('menu-list');
        function initStory() {
            updateScene();
            storyBeat.forEach((beat, i) => {
                const item = document.createElement('div');
                item.className = 'menu-item'; item.innerText = `Moment ${(i+1).toString().padStart(2, '0')}`;
                item.onclick = (e) => { e.stopPropagation(); jumpToBeat(i); };
                menuList.appendChild(item);
            });
        }
        function updateScene() {
            const beat = storyBeat[curIdx];
            scene.style.backgroundImage = `url('${beat.img}')`;
            if (beat.speaker === "player") {
                nameEl.innerText = playerName; nameEl.style.background = "var(--p1-blue)"; boxEl.style.borderLeftColor = "var(--p1-blue)";
            } else {
                nameEl.innerText = "Sylus"; nameEl.style.background = "var(--qin-red)"; boxEl.style.borderLeftColor = "var(--qin-red)";
            }
            textEl.style.transition = 'none'; textEl.style.opacity = 0;
            setTimeout(() => { textEl.innerText = beat.text; textEl.style.transition = 'all 0.5s ease-out'; textEl.style.opacity = 1; }, 50);
            document.querySelectorAll('.menu-item').forEach((item, i) => item.classList.toggle('active', i === curIdx));
        }
        function nextBeat() {
            if (curIdx < storyBeat.length - 1) { curIdx++; updateScene(); } 
            else { document.getElementById('credits-modal').style.display = 'flex'; }
        }
        function closeCredits() { document.getElementById('credits-modal').style.display = 'none'; toggleExit(true); }
        function jumpToBeat(i) { curIdx = i; updateScene(); toggleMenu(false); }
        function toggleMenu(s) { document.getElementById('history-menu').classList.toggle('active', s); }
        function toggleExit(s) { document.getElementById('exit-modal').style.display = s ? 'flex' : 'none'; }
        initStory();
    </script>
</body>
</html>
